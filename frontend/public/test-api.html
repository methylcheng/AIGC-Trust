<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>API 测试</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            padding: 20px;
            max-width: 1200px;
            margin: 0 auto;
        }
        .test-result {
            background: #f5f5f5;
            padding: 15px;
            margin: 10px 0;
            border-radius: 5px;
        }
        .success {
            background: #d4edda;
            color: #155724;
        }
        .error {
            background: #f8d7da;
            color: #721c24;
        }
        pre {
            background: white;
            padding: 10px;
            overflow: auto;
            max-height: 400px;
        }
        button {
            padding: 10px 20px;
            margin: 5px;
            cursor: pointer;
        }
    </style>
</head>
<body>
    <h1>🧪 API 连接测试</h1>
    
    <div>
        <button onclick="testTasks()">测试任务列表 API</button>
        <button onclick="testStats()">测试统计 API</button>
        <button onclick="testCerts()">测试证书 API</button>
    </div>
    
    <div id="results"></div>

    <script>
        async function testTasks() {
            const resultsDiv = document.getElementById('results');
            resultsDiv.innerHTML = '<div class="test-result">正在测试任务列表 API...</div>';
            
            try {
                const response = await fetch('/api/task/list');
                const data = await response.json();
                
                resultsDiv.innerHTML = `
                    <div class="test-result success">
                        <h3>✅ 任务列表 API 成功</h3>
                        <p>状态码: ${response.status}</p>
                        <p>任务总数: ${data.total}</p>
                        <p>返回任务数: ${data.tasks?.length || 0}</p>
                        <pre>${JSON.stringify(data.tasks?.[0], null, 2)}</pre>
                    </div>
                `;
            } catch (error) {
                resultsDiv.innerHTML = `
                    <div class="test-result error">
                        <h3>❌ 任务列表 API 失败</h3>
                        <p>错误: ${error.message}</p>
                        <pre>${error.stack}</pre>
                    </div>
                `;
            }
        }

        async function testStats() {
            const resultsDiv = document.getElementById('results');
            resultsDiv.innerHTML = '<div class="test-result">正在测试统计 API...</div>';
            
            try {
                const response = await fetch('/api/stats/overview');
                const data = await response.json();
                
                resultsDiv.innerHTML = `
                    <div class="test-result success">
                        <h3>✅ 统计 API 成功</h3>
                        <p>状态码: ${response.status}</p>
                        <pre>${JSON.stringify(data, null, 2)}</pre>
                    </div>
                `;
            } catch (error) {
                resultsDiv.innerHTML = `
                    <div class="test-result error">
                        <h3>❌ 统计 API 失败</h3>
                        <p>错误: ${error.message}</p>
                    </div>
                `;
            }
        }

        async function testCerts() {
            const resultsDiv = document.getElementById('results');
            resultsDiv.innerHTML = '<div class="test-result">正在测试证书 API...</div>';
            
            try {
                const response = await fetch('/api/certificates');
                const data = await response.json();
                
                resultsDiv.innerHTML = `
                    <div class="test-result success">
                        <h3>✅ 证书 API 成功</h3>
                        <p>状态码: ${response.status}</p>
                        <p>证书总数: ${data.total}</p>
                        <pre>${JSON.stringify(data.certificates?.[0], null, 2)}</pre>
                    </div>
                `;
            } catch (error) {
                resultsDiv.innerHTML = `
                    <div class="test-result error">
                        <h3>❌ 证书 API 失败</h3>
                        <p>错误: ${error.message}</p>
                    </div>
                `;
            }
        }

        // 自动执行测试
        window.onload = () => {
            testTasks();
        };
    </script>
</body>
</html>
